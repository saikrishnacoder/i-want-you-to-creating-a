<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Form Submissions | Fitness Gurukul</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
    .admin-header { padding: 24px 32px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
    .admin-header h1 { font-size: 1.3rem; font-weight: 700; }
    .admin-header .count { font-size: 0.82rem; color: rgba(255,255,255,0.4); }
    .admin-header .actions { display: flex; gap: 10px; }
    .admin-header button { padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #fff; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .admin-header button:hover { background: rgba(255,255,255,0.12); }
    .admin-header .back { text-decoration: none; color: rgba(255,255,255,0.5); font-size: 0.82rem; }
    .admin-header .back:hover { color: #fff; }
    .admin-body { padding: 24px 32px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 18px; }
    .stat-card .label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
    .stat-card .value { font-size: 1.6rem; font-weight: 800; color: #fff; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    thead th { text-align: left; padding: 10px 14px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.35); border-bottom: 1px solid rgba(255,255,255,0.08); }
    tbody td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); vertical-align: top; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    .name { color: #fff; font-weight: 600; }
    .program { display: inline-block; padding: 2px 10px; border-radius: 6px; background: rgba(255,255,255,0.06); font-size: 0.72rem; color: rgba(255,255,255,0.6); }
    .time { font-size: 0.72rem; color: rgba(255,255,255,0.3); }
    .delete-btn { background: none; border: none; color: rgba(255,255,255,0.25); cursor: pointer; font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; transition: color 0.2s, background 0.2s; }
    .delete-btn:hover { color: #dc3545; background: rgba(220,53,69,0.1); }
    .empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
    .empty h2 { font-size: 1.1rem; margin-bottom: 8px; color: rgba(255,255,255,0.5); }
    @media (max-width: 768px) { .stats { grid-template-columns: 1fr 1fr; } .admin-body { padding: 16px; } .admin-header { padding: 16px; } }
  </style>
</head>
<body>
  <div class="admin-header">
    <div>
      <h1>Form Submissions</h1>
      <span class="count" id="count">Loading...</span>
    </div>
    <div class="actions">
      <a class="back" href="/">&larr; Back to site</a>
      <button onclick="loadSubmissions()">Refresh</button>
      <button onclick="exportCSV()">Export CSV</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="stats">
      <div class="stat-card"><div class="label">Total Submissions</div><div class="value" id="statTotal">0</div></div>
      <div class="stat-card"><div class="label">Today</div><div class="value" id="statToday">0</div></div>
      <div class="stat-card"><div class="label">This Week</div><div class="value" id="statWeek">0</div></div>
      <div class="stat-card"><div class="label">Unique Programs</div><div class="value" id="statPrograms">0</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Program</th>
            <th>Coach</th>
            <th>Goal</th>
            <th>Notes</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">
        <h2>No submissions yet</h2>
        <p>Form submissions will appear here in real time.</p>
      </div>
    </div>
  </div>

  <script>
    let allData = [];

    async function loadSubmissions() {
      try {
        const res = await fetch("/api/submissions");
        const json = await res.json();
        if (json.ok) {
          allData = json.data;
          renderTable(allData);
          updateStats(allData);
        }
      } catch (err) {
        console.error("Failed to load:", err);
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById("tbody");
      const empty = document.getElementById("empty");
      if (!data.length) {
        tbody.innerHTML = "";
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";
      tbody.innerHTML = data.map(s => {
        const d = new Date(s.timestamp);
        const dateStr = d.toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
        const timeStr = d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
        const isCorp = s.form_type === "corporate_event";
        return `<tr>
          <td class="name">${esc(s.name)}</td>
          <td>${esc(s.phone)}</td>
          <td>${esc(s.email || "—")}</td>
          <td><span class="program">${isCorp ? esc(s.event_type || "—") : esc(s.program)}</span></td>
          <td>${s.coach ? esc(s.coach) : (isCorp ? esc(s.company || "—") : "—")}</td>
          <td>${isCorp ? esc(s.attendees || "—") : esc(s.goal)}</td>
          <td>${esc(s.message || "—")}</td>
          <td><span class="time">${dateStr}<br>${timeStr}</span></td>
          <td><button class="delete-btn" onclick="deleteSubmission('${s.id}')">Delete</button></td>
        </tr>`;
      }).join("");
    }

    function updateStats(data) {
      document.getElementById("statTotal").textContent = data.length;
      document.getElementById("count").textContent = data.length + " total submissions";

      const now = new Date();
      const today = data.filter(s => {
        const d = new Date(s.timestamp);
        return d.toDateString() === now.toDateString();
      });
      document.getElementById("statToday").textContent = today.length;

      const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
      const week = data.filter(s => new Date(s.timestamp) >= weekAgo);
      document.getElementById("statWeek").textContent = week.length;

      const programs = new Set(data.map(s => s.program));
      document.getElementById("statPrograms").textContent = programs.size;
    }

    async function deleteSubmission(id) {
      if (!confirm("Delete this submission?")) return;
      await fetch("/api/submissions/" + id, { method: "DELETE" });
      loadSubmissions();
    }

    function exportCSV() {
      if (!allData.length) return alert("No data to export");
      const headers = ["Name", "Phone", "Email", "Program", "Goal", "Notes", "Date", "Time"];
      const rows = allData.map(s => {
        const d = new Date(s.timestamp);
        return [s.name, s.phone, s.email, s.program, s.goal, s.message, d.toLocaleDateString("en-IN"), d.toLocaleTimeString("en-IN")];
      });
      let csv = headers.join(",") + "\n";
      rows.forEach(r => { csv += r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",") + "\n"; });
      const blob = new Blob([csv], { type: "text/csv" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "submissions_" + new Date().toISOString().slice(0, 10) + ".csv";
      a.click();
    }

    function esc(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    loadSubmissions();
    setInterval(loadSubmissions, 15000);
  </script>
</body>
</html>
